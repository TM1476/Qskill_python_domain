<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QSkill Sentiment Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h3>Sentiment Analysis Tool</h3>
            </div>
            <div class="card-body">
                <form action="/analyze" method="POST">
                    <textarea name="rawtext" class="form-control" rows="4" placeholder="Enter text here..." required>{{ rawtext }}</textarea>
                    <button type="submit" class="btn btn-primary mt-3">Analyze</button>
                    <a href="/" class="btn btn-link mt-3 text-decoration-none">Reset</a>
                </form>

                {% if result %}
                <div class="mt-4 alert alert-{{ color }}">
                    <h4>Sentiment: {{ result }}</h4>
                    <p>Polarity Score: {{ polarity }}</p>
                    <p>Subjectivity Score: {{ subjectivity }}</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
